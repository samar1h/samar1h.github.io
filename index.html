<html>

<head>
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0">
  <style>
    h1 {
      text-align: center;
      color: white;
      display: table-cell;
      position: relative; /* Set the position to relative to make it a positioning context */
    }

    body {
      background-color: black; /* Set the background color to black */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .random-image {
      position: absolute;
      user-drag: none;
      -webkit-user-drag: none;
    }
  </style>
</head>

<body>
  <h1><b>Hello World</b></h1>

  <script>
    const h1 = document.querySelector('h1');
    const body = document.body;

    h1.addEventListener('click', () => {
      const randomImage = new Image();
      const randomAnimal = Math.random() < 0.5 ? 'cat' : 'dog';
      const imageSize = Math.floor(Math.random() * 100) + 100; // Random size between 100 and 200
      randomImage.src = `https://placekitten.com/${imageSize}/${imageSize}`;
      if (randomAnimal === 'dog') {
        randomImage.src = `https://placedog.net/${imageSize}/${imageSize}`;
      }

      randomImage.classList.add('random-image');

      // Position the image without overlapping the text
      randomImage.style.left = `${Math.random() * (window.innerWidth - imageSize)}px`;
      randomImage.style.top = `${Math.random() * (window.innerHeight - imageSize)}px`;
      

      randomImage.addEventListener('dragstart', (e) => e.preventDefault());

      // Make every spawned image draggable
      randomImage.addEventListener('mousedown', (e) => {
        let offsetX = e.clientX - randomImage.getBoundingClientRect().left;
        let offsetY = e.clientY - randomImage.getBoundingClientRect().top;

        function dragMove(moveEvent) {
          randomImage.style.left = moveEvent.clientX - offsetX + 'px';
          randomImage.style.top = moveEvent.clientY - offsetY + 'px';
        }

        function dragEnd() {
          document.removeEventListener('mousemove', dragMove);
          document.removeEventListener('mouseup', dragEnd);
        }

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
      });

      body.appendChild(randomImage);
    });
    }
  </script>
</body>

</html>
