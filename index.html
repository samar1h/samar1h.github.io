<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samarth</title>
    <link rel="icon" type="image/png" sizes="32x32" href="s.jpeg">


    <!-- Font Awesome 6 for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts: Fraunces (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,SOFT,wght@0,9..144,50,300;0,9..144,50,400;0,9..144,50,500;0,9..144,50,600;0,9..144,50,700;1,9..144,50,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #1a1817;
            --bg-warm: #211e1c;
            --bg-elevated: #24211e;
            --text-primary: #efe9e2;
            --text-secondary: #b5aca4;
            --text-muted: #7a726a;
            --accent: #d49b6e;
            --accent-bright: #e5af82;
            --accent-soft: #b88156;
            --accent-glow: rgba(212, 155, 110, 0.12);
            --accent-glow-strong: rgba(212, 155, 110, 0.2);
            --card-bg: #211e1c;
            --card-border: #2c2825;
            --card-hover-border: #3d3732;
            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 6px 24px rgba(0, 0, 0, 0.35), 0 2px 6px rgba(0, 0, 0, 0.25);
            --input-bg: #1c1a18;
            --input-border: #2c2825;
            --input-focus-border: #d49b6e;
            --input-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            --divider-color: #2c2825;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --font-display: 'Fraunces', 'Georgia', 'Times New Roman', serif;
            --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 520px;
            --px: 20px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 0 var(--px);
            position: relative;
            overflow-x: hidden;
            isolation: isolate;
        }

        /* ── Ambient top glow ── */
        body::before {
            content: '';
            position: fixed;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 560px;
            height: 380px;
            background: radial-gradient(ellipse at 50% 0%,
                    rgba(212, 155, 110, 0.07) 0%,
                    rgba(212, 155, 110, 0.03) 40%,
                    transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Grain texture overlay ── */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.04;
            filter: url(#grain-filter);
        }

        /* Hidden SVG for grain filter */
        .grain-svg {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        /* ── Main container ── */
        .main-container {
            width: 100%;
            max-width: var(--max-width);
            padding-top: clamp(44px, 10vh, 72px);
            padding-bottom: clamp(48px, 12vh, 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            position: relative;
            z-index: 1;
        }

        /* ══════════════════════════════════
           SECTION: HERO (Avatar + Name + Bio)
           ══════════════════════════════════ */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.05s;
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            width: clamp(100px, 23vw, 124px);
            height: clamp(100px, 23vw, 124px);
            border-radius: 50%;
            margin-bottom: clamp(22px, 4.5vw, 30px);
            flex-shrink: 0;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.1s;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, var(--accent-glow-strong) 0%, transparent 65%);
            opacity: 0.5;
            filter: blur(14px);
            z-index: -1;
            animation: avatarGlow 4.5s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.07);
            }
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2.5px solid #3d3732;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3), 0 1px 4px rgba(0, 0, 0, 0.25);
            transition: var(--transition-smooth);
            background: #2c2825;
            /* fallback if image doesn't load */
        }

        .avatar-wrapper img:hover {
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
            transform: scale(1.04);
            border-color: #4d4640;
        }

        /* Name line — inline greeting + name */
        .name-line {
            font-family: var(--font-display);
            font-size: clamp(2rem, 6.5vw, 2.8rem);
            font-weight: 500;
            font-variation-settings: 'SOFT' 50, 'wght' 500;
            color: var(--text-primary);
            line-height: 1.2;
            letter-spacing: -0.015em;
            margin-bottom: clamp(10px, 2.5vw, 16px);
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.18s;
            text-wrap: balance;
        }

        .greeting-inline {
            font-family: var(--font-body);
            font-size: clamp(0.82rem, 2.3vw, 0.92rem);
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            font-variation-settings: normal;
            white-space: nowrap;
        }

        /* Bio / Description */
        .bio {
            font-family: var(--font-body);
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.55;
            max-width: 360px;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.26s;
            text-wrap: balance;
        }

        .bio .highlight {
            color: var(--accent-bright);
            font-weight: 500;
        }

        /* ══════════════════════════════════
           SECTION: SOCIALS
           ══════════════════════════════════ */
        .socials-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: clamp(28px, 6vw, 40px);
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.34s;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(4px, 1.8vw, 8px);
            list-style: none;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(42px, 10vw, 48px);
            height: clamp(42px, 10vw, 48px);
            border-radius: 50%;
            color: var(--text-secondary);
            background: transparent;
            text-decoration: none;
            font-size: clamp(1.15rem, 3vw, 1.35rem);
            transition: var(--transition-fast);
            position: relative;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--accent-glow);
            opacity: 0;
            transform: scale(0.8);
            transition: var(--transition-fast);
            z-index: -1;
        }

        .social-links a:hover,
        .social-links a:focus-visible {
            color: var(--accent-bright);
            transform: translateY(-2px);
        }

        .social-links a:hover::after,
        .social-links a:focus-visible::after {
            opacity: 1;
            transform: scale(1.2);
        }

        .social-links a:active {
            transform: scale(0.93);
            transition: transform 0.08s ease;
        }

        /* ══════════════════════════════════
           DIVIDER
           ══════════════════════════════════ */
        .section-divider {
            width: 100%;
            max-width: 400px;
            height: 1px;
            background: linear-gradient(to right,
                    transparent 0%,
                    var(--divider-color) 20%,
                    var(--divider-color) 80%,
                    transparent 100%);
            margin: clamp(36px, 8vw, 50px) 0 clamp(30px, 7vw, 42px);
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.42s;
            border: none;
        }

        /* ══════════════════════════════════
           SECTION: PROJECTS
           ══════════════════════════════════ */
        .projects-section {
            width: 100%;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: 0.5s;
        }

        /* Search bar */
        .search-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: clamp(16px, 3.5vw, 22px);
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
            transition: var(--transition-fast);
            z-index: 2;
        }

        .search-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            font-family: var(--font-body);
            font-size: 0.93rem;
            font-weight: 400;
            color: var(--text-primary);
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius-sm);
            outline: none;
            transition: var(--transition-fast);
            box-shadow: var(--input-shadow);
            -webkit-appearance: none;
            appearance: none;
            position: relative;
            z-index: 1;
        }

        .search-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            opacity: 0.8;
        }

        .search-input:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 4px var(--accent-glow), var(--input-shadow);
        }

        .search-input:focus~i,
        .search-wrapper:focus-within i {
            color: var(--accent-bright);
        }

        /* Projects grid — always single column */
        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2.5vw, 14px);
            width: 100%;
            transition: var(--transition-smooth);
        }

        /* Project card */
        .project-card {
            display: flex;
            align-items: flex-start;
            gap: clamp(12px, 3vw, 16px);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: clamp(14px, 3.5vw, 18px) clamp(14px, 3.5vw, 20px);
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 85% 15%, var(--accent-glow) 0%, transparent 65%);
            opacity: 0;
            transition: opacity 0.45s ease;
            pointer-events: none;
            z-index: 0;
        }

        .project-card:hover,
        .project-card:focus-within {
            border-color: var(--card-hover-border);
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }

        .project-card:hover::before,
        .project-card:focus-within::before {
            opacity: 0.8;
        }

        .project-card>* {
            position: relative;
            z-index: 1;
        }

        /* Project icon */
        .project-icon {
            flex-shrink: 0;
            width: clamp(38px, 9vw, 44px);
            height: clamp(38px, 9vw, 44px);
            border-radius: var(--radius-sm);
            background: #282421;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 2.6vw, 1.2rem);
            color: var(--accent);
            transition: var(--transition-fast);
        }

        .project-card:hover .project-icon {
            background: #2f2924;
            color: var(--accent-bright);
        }

        .project-icon img {
            width: 60%;
            height: 60%;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Project content */
        .project-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .project-title {
            font-family: var(--font-body);
            font-size: clamp(0.93rem, 2.5vw, 1.02rem);
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            letter-spacing: -0.01em;
        }

        .project-description {
            font-family: var(--font-body);
            font-size: clamp(0.8rem, 2.1vw, 0.87rem);
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Project action links */
        .project-actions {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(6px, 1.8vw, 10px);
            margin-top: clamp(5px, 1.3vw, 9px);
        }

        .project-actions a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-body);
            font-size: clamp(0.75rem, 1.9vw, 0.81rem);
            font-weight: 500;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 20px;
            transition: var(--transition-fast);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            border: 1px solid transparent;
            background: #282421;
            color: #a09890;
        }

        .project-actions a i {
            font-size: 0.7rem;
            transition: var(--transition-fast);
        }

        .project-actions a:hover,
        .project-actions a:focus-visible {
            transform: translateY(-1px);
        }

        .project-actions a:active {
            transform: scale(0.95);
            transition: transform 0.08s ease;
        }

        .project-actions a.link-github {
            color: #b0a89e;
            background: #282522;
        }
        .project-actions a.link-github:hover,
        .project-actions a.link-github:focus-visible {
            color: #d4ccc2;
            background: #302c28;
            border-color: #4d4640;
        }

        .project-actions a.link-visit {
            color: #8fb89a;
            background: #1c2620;
        }
        .project-actions a.link-visit:hover,
        .project-actions a.link-visit:focus-visible {
            color: #a8d4b4;
            background: #212e26;
            border-color: #3d523f;
        }

        .project-actions a.link-download {
            color: #b0a4c9;
            background: #201e28;
        }
        .project-actions a.link-download:hover,
        .project-actions a.link-download:focus-visible {
            color: #c8bce0;
            background: #27242f;
            border-color: #4a4358;
        }

        /* No results */
        .no-results {
            display: none;
            text-align: center;
            padding: clamp(28px, 7vw, 40px) 16px;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.88rem;
            font-weight: 400;
            animation: fadeUp 0.4s ease both;
        }

        .no-results.visible {
            display: block;
        }

        .no-results i {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        /* ── Keyframes ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .grain-overlay {
                opacity: 0.02;
            }
        }

        /* ── Focus visible ── */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 4px;
        }
        .search-input:focus-visible {
            outline: none;
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 4px var(--accent-glow), var(--input-shadow);
        }
        .social-links a:focus-visible {
            outline-offset: 2px;
            border-radius: 50%;
        }
        .project-actions a:focus-visible {
            outline-offset: 1px;
            border-radius: 20px;
        }

        /* ── Slightly wider on larger screens but still single column ── */
        @media (min-width: 480px) {
            :root {
                --px: 28px;
                --max-width: 540px;
            }
            .project-card {
                padding: 18px 20px;
            }
            .project-actions a {
                padding: 7px 14px;
                font-size: 0.82rem;
            }
        }

        @media (min-width: 768px) {
            :root {
                --px: 32px;
                --max-width: 560px;
            }
            .main-container {
                padding-top: clamp(56px, 10vh, 88px);
            }
        }
    </style>
</head>
<body>

    <!-- Hidden SVG for grain filter -->
    <svg class="grain-svg" aria-hidden="true">
        <filter id="grain-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <!-- Grain overlay -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- Main content -->
    <main class="main-container">

        <!-- ═══ HERO: Avatar + Name + Bio ═══ -->
        <section class="hero-section">
            <div class="avatar-wrapper">
                <!--
                ╔══════════════════════════════════════╗
                ║  PLACE YOUR IMAGE AS "a.jpeg" IN   ║
                ║  THE SAME FOLDER AS THIS FILE.     ║
                ║  Or replace the src below with     ║
                ║  any image URL / path.             ║
                ╚══════════════════════════════════════╝
                -->
                <img
                src="s.jpeg"
                alt="Samarth"
                loading="eager"
                decoding="async"
                width="124"
                height="124"
                onerror="this.style.opacity='0';this.parentElement.style.background='#2c2825';"
                >
            </div>
            <span class="greeting-inline">Hi, I'm&nbsp;</span>
            <h1 class="name-line">
                Samarth
            </h1>
            <p class="bio">
                Pharmacy student at <span class="highlight">Baddi University</span>,
                Passionate about regulatory affairs in pharma &amp; use of AI in my field.
            </p>
        </section>

        <!-- ═══ SOCIALS ═══ -->
        <section class="socials-section">
            <nav class="social-links" aria-label="Social media links">
                <!-- Medium -->
                <a href="https://medium.com/@samar1h" target="_blank" rel="noopener noreferrer" aria-label="Medium" title="Medium">
                    <i class="fa-brands fa-medium"></i>
                </a>
                <!-- GitHub -->
                <a href="https://github.com/samar1h" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <!-- Instagram -->
                <a href="https://instagram.com/_nsamarth" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <!-- LinkedIn -->
                <a href="https://linkedin.com/in/samar1h" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" title="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <!--
                ╔══════════════════════════════════╗
                ║  ADD MORE SOCIAL LINKS HERE:    ║
                ║  Copy an <a> tag above and      ║
                ║  change the href + icon class.  ║
                ║  Font Awesome 6 icons at        ║
                ║  fontawesome.com/icons          ║
                ╚══════════════════════════════════╝
                -->
            </nav>
        </section>

        <!-- ═══ DIVIDER ═══ -->
        <hr class="section-divider" aria-hidden="true">

        <!-- ═══ PROJECTS ═══ -->
        <section class="projects-section">
            <!-- Search bar -->
            <div class="search-wrapper">
                <input
                type="text"
                class="search-input"
                id="project-search"
                placeholder="Search projects..."
                autocomplete="off"
                aria-label="Search projects"
                >
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            </div>

            <!-- Projects grid — always single column -->
            <div class="projects-grid" id="projects-grid">
                <!-- Cards rendered by JS -->
            </div>

            <!-- No results message -->
            <div class="no-results" id="no-results">
                <i class="fa-regular fa-folder-open" aria-hidden="true"></i>
                No projects match your search.
            </div>
        </section>

    </main>

    <script>
        (function() {
            // ─────────────────────────────────────
            // PROJECT DATA — Edit this array to add/remove projects
            // ─────────────────────────────────────
            const projects = [{
                title: 'GYM Helper',

            // ─────────────────────────────────────
            // RENDER PROJECTS
            // ─────────────────────────────────────
            const projectsGrid = document.getElementById('projects-grid');
            const noResults = document.getElementById('no-results');
            const searchInput = document.getElementById('project-search');

            function createProjectCard(project) {
                const card = document.createElement('div');
                card.className = 'project-card';

                // Icon
                const iconDiv = document.createElement('div');
                iconDiv.className = 'project-icon';
                if (project.iconUrl) {
                    const img = document.createElement('img');
                    img.src = project.iconUrl;
                    img.alt = '';
                    img.loading = 'lazy';
                    img.width = 28;
                    img.height = 28;
                    iconDiv.appendChild(img);
                } else if (project.iconFA) {
                    const i = document.createElement('i');
                    i.className = project.iconFA;
                    i.setAttribute('aria-hidden', 'true');
                    iconDiv.appendChild(i);
                } else {
                    const i = document.createElement('i');
                    i.className = 'fa-solid fa-folder';
                    i.setAttribute('aria-hidden', 'true');
                    iconDiv.appendChild(i);
                }
                card.appendChild(iconDiv);

                // Content
                const content = document.createElement('div');
                content.className = 'project-content';

                const title = document.createElement('h3');
                title.className = 'project-title';
                title.textContent = project.title;
                content.appendChild(title);

                const desc = document.createElement('p');
                desc.className = 'project-description';
                desc.textContent = project.description;
                content.appendChild(desc);

                // Actions
                const actions = document.createElement('div');
                actions.className = 'project-actions';

                if (project.githubUrl) {
                    const a = document.createElement('a');
                    a.href = project.githubUrl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'link-github';
                    a.innerHTML = '<i class="fa-brands fa-github" aria-hidden="true"></i> Source';
                    a.setAttribute('aria-label', `View source code for ${project.title}`);
                    actions.appendChild(a);
                }

                if (project.visitUrl) {
                    const a = document.createElement('a');
                    a.href = project.visitUrl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'link-visit';
                    a.innerHTML =
                        '<i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i> Visit';
                    a.setAttribute('aria-label', `Visit ${project.title}`);
                    actions.appendChild(a);
                }

                if (project.downloadUrl) {
                    const a = document.createElement('a');
                    a.href = project.downloadUrl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'link-download';
                    const label = project.downloadLabel || 'Download';
                    a.innerHTML = `<i class="fa-solid fa-download" aria-hidden="true"></i> ${label}`;
                    a.setAttribute('aria-label', `Download ${label} for ${project.title}`);
                    if (project.downloadUrl === '#') {
                        a.addEventListener('click', function(e) {
                            e.preventDefault();
                            alert(
                                '📁 Download failed — please try again later.'
                                );
                        });
                    }
                    actions.appendChild(a);
                }

                content.appendChild(actions);
                card.appendChild(content);

                // Store searchable text
                card.dataset.searchText = (project.title + ' ' + project.description).toLowerCase();

                return card;
            }

            function renderAllProjects() {
                projectsGrid.innerHTML = '';
                projects.forEach(project => {
                    projectsGrid.appendChild(createProjectCard(project));
                });
                filterProjects();
            }

            function filterProjects() {
                const query = searchInput.value.toLowerCase().trim();
                const cards = projectsGrid.querySelectorAll('.project-card');
                let visibleCount = 0;

                cards.forEach(card => {
                    const searchText = card.dataset.searchText || '';
                    if (!query || searchText.includes(query)) {
                        card.style.display = '';
                        card.style.animation =
                            'fadeUp 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) both';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                // Show/hide no-results
                if (visibleCount === 0) {
                    noResults.classList.add('visible');
                } else {
                    noResults.classList.remove('visible');
                }
            }

            // ─────────────────────────────────────
            // INIT
            // ─────────────────────────────────────
            renderAllProjects();

            // Search handler with debounce
            let debounceTimer;
            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(filterProjects, 100);
            });

            // Clear search on Escape key
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    filterProjects();
                    searchInput.blur();
                }
            });

            console.log('%c✨ Dark-themed personal site ready.',
                'color:#d49b6e;font-weight:600;');
            console.log('%c✏️ Edit the `projects` array in the script to add your own projects.', '');
            console.log('%c📸 Place your image as "a.jpeg" in the same folder, or update the src.', '');
            console.log('%c🔗 Add more social links in the .social-links nav section.', '');
        })();
    </script>
